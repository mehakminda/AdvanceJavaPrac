spring.application.name=SpringDataJPA10JobSeekerApp_LOB

spring.datasource.url=jdbc:mysql://localhost:3306/testdb
spring.datasource.username=testuser
spring.datasource.password=OpenText123$

# JPA hibernate properties
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
# made this as 'create' initially, that way it creates table if not exists
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.enable_lazy_loading_no_trans=true

# Prevent Spring Boot's default camelCase -> snake_case conversion so JPA uses entity field names as column names
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
